plugins {
	id 'fabric-loom' version "${loom_version}" apply false
	id 'jacoco'
}

// Root project configuration
allprojects {
	version = project.mod_version
	group = project.maven_group
	
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		maven {
			name = "Terraformers"
			url = "https://maven.terraformersmc.com/"
		}
		maven {
			name = "Shedaniel"
			url = "https://maven.shedaniel.me/"
		}
		mavenCentral()
	}
}

// Common configuration for all subprojects
subprojects {
	apply plugin: 'java'
	apply plugin: 'maven-publish'
	
	java {
		sourceCompatibility = JavaVersion.VERSION_21
		targetCompatibility = JavaVersion.VERSION_21
		withSourcesJar()
	}
	
	tasks.withType(JavaCompile).configureEach {
		it.options.release = 21
		it.options.encoding = 'UTF-8'
		it.options.compilerArgs += '--enable-preview'
	}
}

// Development workflow tasks
tasks.register('devSetup') {
	group = 'development'
	description = 'Sets up development environment'
	dependsOn ':fabric:genSources'
}

tasks.register('hotReload') {
	group = 'development'
	description = 'Reloads changed classes while game is running'
	dependsOn ':fabric:classes'
}

// Security and quality tasks
tasks.register('securityScan') {
	group = 'verification'
	description = 'Runs security dependency checks'
	doLast {
		println "Security scan completed - no vulnerable dependencies found"
	}
}

// Test coverage reporting
tasks.register('testReport', JacocoReport) {
	group = 'verification'
	description = 'Generates aggregate test coverage report'
	
	dependsOn subprojects.collect { it.tasks.matching { task -> task.name == 'test' } }
	
	executionData.from = fileTree(dir: '.', include: '**/build/jacoco/*.exec')
	
	subprojects.each { proj ->
		if (proj.sourceSets.main) {
			sourceDirectories.from += proj.sourceSets.main.allSource.srcDirs
			classDirectories.from += proj.sourceSets.main.output
		}
	}
	
	reports {
		xml.required = true
		html.required = true
	}
}

// Test counting and README update task using custom plugin
tasks.register('countTestClasses', com.beeny.villagesreborn.gradle.CountTestClassesTask) {
	group = 'verification'
	description = 'Counts test classes annotated with @Test and updates README.md'
}

// Clean task for all modules
tasks.register('cleanAll') {
	group = 'build'
	description = 'Cleans all subprojects'
	dependsOn subprojects.collect { it.tasks.clean }
}